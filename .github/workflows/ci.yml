name: Continuous Integration

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./PersonalLearningPro

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './PersonalLearningPro/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Check Types
      run: npm run check

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm run test

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Test Docker Development Build
      working-directory: ./PersonalLearningPro
      run: docker build --target development -t plp-dev-test .

    - name: Test Docker Production Build
      working-directory: ./PersonalLearningPro
      run: docker build --target production -t plp-prod-test .
